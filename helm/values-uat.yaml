# UAT overrides
env: uat
logLevel: info

api:
  replicaCount: 2
  autoscaling:
    minReplicas: 2
    maxReplicas: 5
    targetCPU: 70
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

networkPolicy:
  enabled: true
