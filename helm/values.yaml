# Default values (development)
env: development
logLevel: debug

image:
  repository: ghcr.io/heenzaa1998/basic-cicd-k8s
  tag: "latest"
  pullPolicy: IfNotPresent

# ─── API Service ─────────────────────────────────────────
api:
  replicaCount: 2

  service:
    type: ClusterIP
    port: 80

  autoscaling:
    minReplicas: 2
    maxReplicas: 5
    targetCPU: 70

  probes:
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 3

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: api
            topologyKey: kubernetes.io/hostname

# ─── Worker Service ──────────────────────────────────────
worker:
  replicaCount: 1
  intervalMs: "5000"

  probes:
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 3

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi

# ─── Secret (optional) ──────────────────────────────────
secret:
  enabled: false
  data: {}

# ─── Ingress (optional) ─────────────────────────────────
ingress:
  enabled: false
  className: nginx
  host: api.example.com
  tls: false
  annotations: {}

# ─── NetworkPolicy (optional) ───────────────────────────
networkPolicy:
  enabled: false

# ─── Monitoring ─────────────────────────────────────────
monitoring:
  serviceMonitor:
    enabled: false
    interval: 15s
    scrapeTimeout: 10s
    labels: {}
  prometheusRule:
    enabled: false
    labels: {}
