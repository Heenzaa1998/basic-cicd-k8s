services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "${API_PORT:-3000}:3000"
    env_file:
      - ./env/${ENV_FILE:-dev}.env
    environment:
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file:
      - ./env/${ENV_FILE:-dev}.env
    restart: unless-stopped
